name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Test and build
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev]"
          python -m ruff check cml2gns tests
          python -m ruff format --check cml2gns tests
          python -m pytest -q
          python -m build
          python -m twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: release-distributions
          path: dist/

  publish:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: pypi
      url: https://pypi.org/p/cml2gns
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-distributions
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
